<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>ManageBac Task Preview</title>
  <style>
    /* ── Reset & base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #101828;
      background: transparent;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 0;
    }

    /* ── Outer card shell ── */
    .mb-card {
      width: 100%;
      max-width: 860px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      overflow: hidden;
    }

    /* ── Header banner (default teal; overridden inline per student theme) ── */
    .mb-header { background: #00857d; padding: 14px 20px 13px; }
    .mb-header h1 { font-size: 1.15rem; font-weight: 700; color: #fff; line-height: 1.3; }
    .mb-header .class-name { font-size: 0.78rem; color: rgba(255,255,255,0.75); margin-top: 2px; font-weight: 400; }

    /* ── Content area ── */
    .content-area { padding: 10px; }

    /* ── Main task card box ── */
    .task-card {
      border: 1px solid #d9e7f7;
      border-radius: 6px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    /* ── Task row (date + meta + right panel) ── */
    .task-row { display: flex; align-items: stretch; flex-wrap: nowrap; }

    /* Left: date + meta */
    .task-row-main {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      padding: 10px;
      flex: 1;
      min-width: 0;
    }

    /* Right: criteria column (graded tasks) */
    .criteria-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 12px;
      border-left: 1px solid #eaecf0;
      background-color: #f9fafb;
      border-radius: 0 5px 5px 0;
      flex-shrink: 0;
    }
    .criteria-scores {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .criterion { display: flex; align-items: center; gap: 4px; }
    .criterion-label { color: #667085; font-size: 0.72rem; }

    /* Right: status panel (non-graded tasks) — same cell style as criteria-col */
    .task-status-right {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-left: 1px solid #eaecf0;
      background-color: #f9fafb;
      border-radius: 0 5px 5px 0;
      flex-shrink: 0;
      gap: 3px;
      min-width: 90px;
    }
    .task-status-right svg { width: 18px; height: 18px; }
    .task-status-right .status-label {
      font-size: 0.72rem;
      font-weight: 500;
      text-align: center;
      line-height: 1.3;
    }
    .status-complete   { color: #027a48; }
    .status-submitted  { color: #027a48; }
    .status-not-sub    { color: #c01048; }
    .status-incomplete { color: #b42318; }
    .status-not-assessed { color: #b54708; }
    .status-na         { color: #667085; }

    /* ── Date badge ── */
    .date-badge { text-align: center; min-width: 48px; flex-shrink: 0; }
    .date-badge .month {
      background-color: #d92d20;
      border-top-left-radius: 3px; border-top-right-radius: 3px;
      color: #fff; text-transform: uppercase; font-size: 12px; line-height: 17px; padding: 0 4px;
    }
    .date-badge.past-due .month { background-color: #667085; }
    .date-badge .day {
      line-height: 1.6666; border: 1px solid #a6bedc; border-top: none;
      font-size: 15px; border-bottom-left-radius: 3px; border-bottom-right-radius: 3px;
      background-color: #fff; font-weight: 400; padding: 0 4px; color: #101828;
    }

    /* ── Task meta ── */
    .task-meta { flex: 1; min-width: 0; }
    .task-title {
      font-size: 1rem; font-weight: 700; color: #101828;
      display: flex; align-items: center; gap: 5px; margin-bottom: 7px;
    }
    .task-title .info-icon { color: #98a2b3; cursor: pointer; flex-shrink: 0; }
    .labels-row { display: flex; align-items: center; flex-wrap: wrap; gap: 5px; }

    /* ── Labels ── */
    .label {
      display: inline-block; position: relative; overflow: hidden;
      font-size: 12px; line-height: 16px; padding: 1px 5px; border-radius: 6px;
      font-weight: 400; color: var(--lc, #475467); white-space: nowrap;
    }
    .label::after { content: ''; position: absolute; inset: 0; background: currentColor; opacity: .12; }
    .label-summative   { --lc: #478cfe; }
    .label-formative   { --lc: #039855; }
    .label-homework    { --lc: #2175C6; }
    .label-classwork   { --lc: #7a5af8; }
    .label-pending     { --lc: #344054; display: inline-flex; align-items: center; gap: 3px; }
    .label-start       { --lc: #f79009; display: inline-flex; align-items: center; }
    .label-unit-current { --lc: #ff8c00; }

    /* Submitted badge (in labels row, graded tasks) */
    .badge-submitted {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px; font-size: 0.72rem; font-weight: 400;
      border: 1px solid #a6f4c5; background: #ecfdf3; color: #027a48;
    }

    /* Due time */
    .due-row {
      display: inline-flex; align-items: center; gap: 4px;
      color: #475467; font-size: 0.78rem;
    }

    /* label-group (score/points pill pair) */
    .label-group { display: inline-flex; }
    .label-group > .label:not(:first-child) { margin-left: -1px; }
    .label-score  { --lc: #478cfe; border-radius: 6px 0 0 6px; }
    .label-points { --lc: #1aaf5d; border-radius: 0 6px 6px 0; }

    /* ── Teacher comment ── */
    .teacher-comment { padding: 10px; border-top: 1px solid #eaecf0; }
    .teacher-comment-body { font-size: 0.875rem; line-height: 1.7; color: #344054; }
    .show-more-text.collapsed {
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .show-toggle {
      margin-top: 6px; color: #1570ef; font-size: 0.8rem; font-weight: 600;
      cursor: pointer; display: inline-flex; align-items: center; gap: 3px;
      background: none; border: none; padding: 0;
    }
    .show-toggle:hover { text-decoration: underline; }

    /* ── Unit section ── */
    .unit-outer { border-top: 1px solid #eaecf0; padding: 8px 10px; }
    .unit-container {
      display: flex; align-items: center; gap: 8px; padding: 8px;
      border: 1px solid #d9e7f7; border-radius: 6px;
    }
    .unit-nested-arrow { flex-shrink: 0; }
    .unit-card { display: flex; gap: 12px; align-items: flex-start; flex: 1; min-width: 0; }
    .unit-thumb {
      width: 50px; height: 42px; min-width: 50px; border-radius: 6px;
      background-size: cover; background-position: center; flex-shrink: 0;
    }
    .unit-details { flex: 1; min-width: 0; }
    .unit-name {
      font-weight: 700; font-size: 0.88rem; color: #1570ef;
      text-decoration: none; display: block; margin-bottom: 4px;
    }
    .unit-name:hover { text-decoration: underline; }
    .unit-labels { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .unit-progress-wrapper {
      border: 1px solid #ff8c00; height: 18px; width: 60px; border-radius: 4px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .unit-progress-track { background: #d0d5dd; border-radius: 5px; height: 3px; width: calc(100% - 8px); overflow: hidden; }
    .unit-progress-fill  { height: 100%; border-radius: 5px; background: #ff8c00; }
    .unit-duration { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #475467; }
    .unit-duration svg { width: 14px; height: 14px; }

    /* ── Section boxes ── */
    .section { border: 1px solid #eaecf0; border-radius: 6px; margin: 0 0 10px; overflow: hidden; }
    .section-header {
      display: flex; align-items: center; justify-content: space-between; padding: 10px 15px 6px;
    }
    .section-title { font-size: 0.95rem; font-weight: 700; color: #101828; }
    .section-body  { padding: 0 15px 14px; }

    /* ── Description ── */
    .description-content { font-size: 0.875rem; line-height: 1.75; color: #344054; }
    .description-content p  { margin-bottom: 8px; }
    .description-content ol,
    .description-content ul { padding-left: 20px; margin-bottom: 8px; }
    .description-content strong { font-weight: 700; }
    .description-content em { font-style: italic; }
    .description-content u  { text-decoration: underline; }

    /* ── Dropbox ── */
    .dropbox-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 15px; margin: 0 10px;
    }
    .dropbox-table { width: 100%; border-collapse: collapse; }
    .dropbox-table th {
      font-size: 0.72rem; font-weight: 600; color: #667085;
      text-transform: uppercase; letter-spacing: .04em;
      padding: 6px 8px; text-align: left; border-bottom: 1px solid #eaecf0;
    }
    .dropbox-table th:first-child { padding-left: 15px; }
    .dropbox-table td { padding: 10px 8px; vertical-align: middle; }
    .dropbox-table td:first-child { padding-left: 15px; }
    .dropbox-table th:nth-child(2), .dropbox-table td:nth-child(2) { width: 70px; }
    .dropbox-table th:last-child, .dropbox-table td:last-child {
      width: 1%; white-space: nowrap; padding-right: 20px; text-align: right;
    }
    .dropbox-table tr:not(:last-child) td { border-bottom: 1px solid #f2f4f7; }
    .file-link {
      display: flex; align-items: center; gap: 8px;
      color: #1570ef; text-decoration: none; font-size: 0.875rem; font-weight: 500;
    }
    .file-link:hover { text-decoration: underline; }
    .file-meta { font-size: 0.75rem; color: #667085; margin-top: 2px; }
    .btn-feedback {
      display: inline-flex; align-items: center; gap: 5px; padding: 5px 12px;
      border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; color: #344054;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; text-decoration: none; white-space: nowrap;
    }
    .btn-feedback:hover { background: #f9fafb; }
    .btn-row { display: flex; gap: 8px; align-items: center; }
    .btn-gdrive {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 12px;
      border: 1px solid #d0d5dd; border-radius: 6px; background: #fff; color: #344054;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; text-decoration: none;
    }
    .btn-upload {
      display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px;
      border-radius: 6px; background: #1a8c7a; color: #fff;
      font-size: 0.78rem; font-weight: 600; cursor: pointer; text-decoration: none; border: none;
    }
    .btn-upload:hover { background: #157a6a; }

    /* Empty dropbox state */
    .dropbox-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 20px; color: #667085; font-size: 0.82rem; text-align: center;
    }
    .dropbox-empty svg { width: 44px; height: 44px; margin-bottom: 10px; }
    .dropbox-empty strong { display: block; font-size: 0.9rem; color: #344054; margin-bottom: 4px; font-weight: 600; }
    .dropbox-empty-actions { display: flex; gap: 10px; margin-top: 14px; }
    .dropbox-late-note { font-size: 0.75rem; color: #c01048; margin-top: 8px; }

    /* Discussions empty state */
    .discussions-empty {
      display: flex; flex-direction: column; align-items: center;
      padding: 28px 20px; color: #667085; font-size: 0.82rem; text-align: center;
    }
    .discussions-empty svg { width: 44px; height: 44px; margin-bottom: 10px; opacity: .4; }
    .discussions-empty strong { display: block; font-size: 0.9rem; color: #344054; margin-bottom: 4px; font-weight: 600; }

    /* SVG icons */
    svg.icon    { width: 14px; height: 14px; flex-shrink: 0; }
    svg.icon-16 { width: 16px; height: 16px; flex-shrink: 0; }

    /* ── Open in ManageBac ── */
    .open-in-mb {
      display: flex; align-items: center; justify-content: center; padding: 14px 20px;
      gap: 6px; color: #1570ef; font-size: 0.82rem; font-weight: 600;
      text-decoration: none; border-top: 1px solid #eaecf0;
    }
    .open-in-mb:hover { background: #f9fafb; }

    .empty { color: #98a2b3; font-size: 0.82rem; font-style: italic; padding: 8px 0; }

    /* ── Loading spinner ── */
    @keyframes _spin { to { transform: rotate(360deg); } }
    ._loading-wrap {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 60px 24px; gap: 14px; min-height: 200px;
    }
    ._loading-ring {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb;
      border-top-color: #1a7a5e;
      border-radius: 50%;
      animation: _spin 0.75s linear infinite;
    }
    ._loading-text { color: #98a2b3; font-size: 0.82rem; }
  </style>
</head>

// ─── Status right-side panel ────────────────────────────────────────
function statusRightPanel(status) {
  const s = (status || '').toLowerCase();
  // Check more-specific strings first (incomplete before complete, not-sub before submitted)
  if (s.includes('incomplet')) {
    return `<div class="task-status-right status-incomplete">${ICONS.xcircle}<span class="status-label">Incomplete</span></div>`;
  }
  if (s.includes('not sub')) {
    return `<div class="task-status-right status-not-sub">${ICONS.clockLg}<span class="status-label">Not Submitted</span></div>`;
  }
  if (s.includes('not assessed') || s.includes('not assess')) {
    return `<div class="task-status-right status-not-assessed">${ICONS.clockLg}<span class="status-label">Not Assessed Yet</span></div>`;
  }
  if (s.includes('complete') || s === 'complete') {
    return `<div class="task-status-right status-complete">${ICONS.checkLg}<span class="status-label">Complete</span></div>`;
  }
  if (s === 'n/a') {
    return `<div class="task-status-right status-na"><span class="status-label">N/A</span></div>`;
  }
  return '';
}

// ─── Main render ────────────────────────────────────────────────────
function renderCard(task) {
  let h = '';
  const hasGrades = !!(task.grades && task.grades.length);
  const hasDropbox = task.submitted_files !== null && task.submitted_files !== undefined;
  const status = (task.status || '').toLowerCase();
  const isSubmitted = status.includes('submit') && !status.includes('not sub');
  const isPending   = status === 'pending';

  // ── Header ── (background follows the student's ManageBac colour theme)
  const themeColor = task.theme_color || '#00857d';
  h += `<div class="mb-header" style="background:${esc(themeColor)}">
    <h1>${esc(task.title)}</h1>
    ${task.class_name ? `<div class="class-name">${esc(task.class_name)}</div>` : ''}
  </div>`;

  h += '<div class="content-area">';

  // ── Task card box ──
  h += '<div class="task-card">';
  h += '<div class="task-row">';
  h += '<div class="task-row-main">';

  // Date badge
  h += `<div class="date-badge${task.due_past ? ' past-due' : ''}">
    <div class="month">${esc(task.due_month)}</div>
    <div class="day">${esc(task.due_day)}</div>
  </div>`;

  // Title + labels row
  h += '<div class="task-meta">';
  h += `<div class="task-title">${esc(task.title)} ${ICONS.info}</div>`;
  h += '<div class="labels-row">';

  // Task-type labels
  (task.labels || []).forEach(l => {
    h += `<span class="label ${esc(l.style)}">${esc(l.text)}</span>`;
  });

  // Submitted badge (green, in labels row) — only for graded/submitted tasks
  if (isSubmitted) {
    h += `<span class="badge-submitted">${ICONS.check}${esc(task.status)}</span>`;
  }

  // Pending badge (in labels row) — when status is Pending
  if (isPending) {
    h += `<span class="label label-pending">${ICONS.clock}Pending</span>`;
  }

  // Due time
  if (task.due_time) {
    h += `<span class="due-row">${ICONS.clock}${esc(task.due_time)}</span>`;
  }

  h += '</div>'; // labels-row
  h += '</div>'; // task-meta
  h += '</div>'; // task-row-main

  // Right panel: criteria column OR status
  if (hasGrades) {
    h += '<div class="criteria-col"><div class="criteria-scores">';
    task.grades.forEach(g => {
      const scoreStr = (g.score === null || g.score === undefined) ? 'N/A' : g.score;
      h += `<div class="criterion">
        <span class="criterion-label">${esc(g.label)}:</span>
        <div class="label-group">
          <span class="label label-score">${esc(scoreStr)}</span>
          ${scoreStr !== 'N/A' ? `<span class="label label-points">${esc(g.max)}</span>` : ''}
        </div>
      </div>`;
    });
    h += '</div></div>'; // criteria-scores, criteria-col
  } else if (!isPending && !isSubmitted && task.status) {
    h += statusRightPanel(task.status);
  }

  h += '</div>'; // task-row

  // ── Teacher comment ──
  if (task.teacher_comment) {
    const paras = task.teacher_comment.split(/\n\n+/).filter(Boolean);
    h += `<div class="teacher-comment">
      <div class="teacher-comment-body">
        <div class="show-more-text collapsed" id="tc-body">
          ${paras.map(p => `<p>${esc(p)}</p>`).join('')}
        </div>
        <button class="show-toggle" onclick="toggleShowMore('tc-body',this)">
          Show More ${ICONS.chevDown}
        </button>
      </div>
    </div>`;
  }

  // ── Unit ──
  if (task.unit) {
    const u = task.unit;
    h += `<div class="unit-outer"><div class="unit-container">
      ${ICONS.nestedArrow}
      <div class="unit-card">
        <div class="unit-thumb" style="background-color:${esc(u.color)}"></div>
        <div class="unit-details">
          <a class="unit-name" href="${esc(u.url||'#')}" target="_blank">${esc(u.name)}</a>
          <div class="unit-labels">
            ${u.start_label ? `<span class="label label-start">${ICONS.calendar}${esc(u.start_label)}</span>` : ''}
            <span class="label label-unit-current">Current Unit</span>
            ${u.progress != null ? `<div class="unit-progress-wrapper">
              <div class="unit-progress-track">
                <div class="unit-progress-fill" style="width:${u.progress}%"></div>
              </div>
            </div>` : ''}
            ${u.duration ? `<div class="unit-duration">${ICONS.clockGray}${esc(u.duration)}</div>` : ''}
          </div>
        </div>
      </div>
    </div></div>`;
  }

  h += '</div>'; // task-card

  // ── Description ──
  if (task.description) {
    h += `<div class="section">
      <div class="section-header"><span class="section-title">Description</span></div>
      <div class="section-body">
        <div class="description-content show-more-text collapsed" id="desc-body">${task.description}</div>
        <button class="show-toggle" onclick="toggleShowMore('desc-body',this)" style="margin-top:8px">
          Show More ${ICONS.chevDown}
        </button>
      </div>
    </div>`;
  }

  // ── Dropbox ── (only if has_submission_box / submitted_files is not null)
  if (hasDropbox) {
    h += '<div class="section" style="border:none;margin:0">';
    h += `<div class="dropbox-header">
      <span class="section-title">Dropbox</span>
      <div class="btn-row">
        <a class="btn-gdrive" href="${esc(task.url)}" target="_blank">${ICONS.gdrive} Add From GDrive</a>
        <a class="btn-upload" href="${esc(task.url)}" target="_blank">${ICONS.upload} Upload Submission</a>
      </div>
    </div>`;

    if (task.submitted_files && task.submitted_files.length) {
      h += '<table class="dropbox-table">';
      h += '<thead><tr><th>File</th><th>Turnitin Similarity Index</th><th></th></tr></thead>';
      h += '<tbody>';
      task.submitted_files.forEach(f => {
        h += `<tr>
          <td>
            <a class="file-link" href="${esc(f.url)}" target="_blank">${ICONS.file}${esc(f.name)}</a>
            <div class="file-meta">Uploaded ${esc(f.uploaded)}</div>
          </td>
          <td>—</td>
          <td><a class="btn-feedback" href="${esc(f.url)}" target="_blank">${ICONS.doc} View Teacher Feedback</a></td>
        </tr>`;
      });
      h += '</tbody></table>';
    }
    // Empty dropbox: no content below header
    h += '</div>'; // dropbox section
  }

  // ── Discussions ── only show when there are actual posts
  if (task.discussions && task.discussions.length) {
    h += `<div class="section" style="margin:0 0 10px">
      <div class="section-header">
        <span class="section-title">💬 Discussions</span>
        <div class="btn-row">
          <a class="btn-gdrive" href="${esc(task.url)}" target="_blank">+ Create Discussion</a>
          <a class="btn-gdrive" href="${esc(task.url)}" target="_blank">View All Discussions</a>
        </div>
      </div>`;
    h += '</div>';
  }

  h += '</div>'; // content-area

  // ── Open in ManageBac ──
  h += `<a class="open-in-mb" href="${esc(task.url)}" target="_blank" rel="noopener">
    Open in ManageBac ${ICONS.external}
  </a>`;

  document.getElementById('card').innerHTML = h;
}

function toggleShowMore(id, btn) {
  const el = document.getElementById(id);
  const collapsed = el.classList.toggle('collapsed');
  btn.innerHTML = collapsed
    ? `Show More ${ICONS.chevDown}`
    : `Show Less ${ICONS.chevUp}`;
}

// After render, hide Show More buttons where content doesn't actually overflow
function initShowMore() {
  document.querySelectorAll('.show-more-text').forEach(el => {
    const btn = el.nextElementSibling;
    if (!btn || !btn.classList.contains('show-toggle')) return;
    // Temporarily uncollapse to measure real height
    el.classList.remove('collapsed');
    const fullHeight = el.scrollHeight;
    el.classList.add('collapsed');
    const clampedHeight = el.clientHeight;
    if (fullHeight <= clampedHeight + 4) {
      // Content fits — remove clamp and hide button
      el.classList.remove('collapsed');
      btn.style.display = 'none';
    }
  });
}

// Server injection point — replaced with real task data at render time.
// When null, falls back to the static TASK example object above.
const _INJECTED_TASK = /*INJECT_TASK*/null;

function _doRender(taskObj) {
  renderCard(taskObj);
  requestAnimationFrame(initShowMore);
}

// Priority 1: window.openai.toolOutput — ChatGPT sets this to the CURRENT call's
// structuredContent before the script runs. Always up-to-date even when the widget
// HTML is cached from a previous call (which causes _INJECTED_TASK to be stale).
// Priority 2: _INJECTED_TASK — only reliable on first load; stale when HTML is cached.
// Priority 3: async message / event listeners.
const _liveData = window.openai?.toolOutput;
if (_liveData && _liveData.title) {
  _doRender(_liveData);
} else if (_INJECTED_TASK) {
  // No live data (e.g. standalone preview) — use baked data
  _doRender(_INJECTED_TASK);
} else {
  // Show a clean spinner — no school-specific content while waiting for real data
    document.getElementById('card').innerHTML =
      '<div class="_loading-wrap">' +
        '<div class="_loading-ring"></div>' +
        '<div class="_loading-text">Loading task…</div>' +
      '</div>';
    window.addEventListener('message', (ev) => {
      if (ev.source !== window.parent) return;
      const msg = ev.data;
      if (msg.method === 'ui/notifications/tool-result') {
        const d = msg.params?.structuredContent;
        if (d && d.title) {
          _doRender(d);
        }
      }
    });
    // Also listen for openai:set_globals which fires when globals are available
    window.addEventListener('openai:set_globals', () => {
      const d = window.openai?.toolOutput;
      if (d && d.title) _doRender(d);
    });
}
</script>
